<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Christian Thulin Pfeifer - Dev Portfolio</title>
    <script>
      // SPA redirect for GitHub Pages
      // Encodes the path into a query string so index.html can restore it
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1).join('/') +
          '/?/' +
          l.pathname.slice(1).replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
